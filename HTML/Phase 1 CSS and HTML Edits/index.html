<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workspace Finder</title>
  <link rel="stylesheet" href="/CSS/style.css">
</head>
<body>

  <div class="container">
    <h1>🔍 Find a Workspace</h1>

    <header class="universal-header">
    <table class="nav-table-container" width="100%" border="0" cellspacing="0" cellpadding="0">
        <tbody>
            <tr>
                <td class="nav-logo-cell">
                    <a href="index.html" class="logo-brand">
                        BRAND LOGO
                    </a>
                </td>

                <td class="nav-menu-cell">
                    <ul class="nav-menu">
                        <li><a href="/HTML/propertyDetails.html" class="nav-link active">Details</a></li>
                        <li><a href="/HTML/search.html" class="nav-link">Search Listings</a></li>
                        <li><a href="/HTML/addPropertyPage.html" class="nav-link">Add Property</a></li>
                        <li><a href="/HTML/addWorkSpacePage.html" class="nav-link">Add Workplace</a></li>
                    </ul>
                </td>

                <td class="nav-action-cell" align="right">
                    <div class="nav-search-box">
                        <input type="text" class="nav-search-input" placeholder="Quick Search...">
                        </div>
                <td class="nav-menu-cell">
                    <ul class="nav-menu">
                        <li><a href="/HTML/login.html" class="nav-link">Login</a></li>
                        <!-- Swap these out if logged in -->
                        <li><a href="/HTML/propertyDetails.html" class="nav-link">Profile</a></li>
                    </ul>
                </td>
                </td>
            </tr>
        </tbody>
    </table>
</header>

   
    <div class="filters">
      <input type="text" id="location" placeholder="Neighborhood">

      <input type="number" id="maxPrice" placeholder="Max Price">

      <input type="number" id="minSeats" placeholder="Min Seats">

      <select id="smoking">
        <option value="">Smoking?</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
      </select>

      <button onclick="search()">Search</button>
    </div>

    <!-- RESULTS -->
    <div id="results"></div>

    <!-- DETAILS -->
    <div id="details"></div>

  </div>

  <footer id="footer"></footer>
  <script>
  document.getElementById("footer").innerText = "Copywrite " + new Date().getFullYear() + " Modern Users Directory";
  </script>
  


  <script src="script.js"></script>
</body>
</html>
