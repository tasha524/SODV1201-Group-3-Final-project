<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add property</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <header>

    </header>

    <main>
        <h1>Add a Property</h1>
        <form id="property">
            <fieldset>
                <legend>Add Property</legend>
                <table border="1">
                    <tbody>
                        <tr>
                            <td><label for="address">Enter Address:</label></td>
                            <td><input type="text" id="address" name="address" placeholder="Enter full address"></td>
                        </tr>
                        <tr>
                            <td><label for="neighborhood ">Enter Neighborhood:</label></td>
                            <td><input type="text" id="neighborhood " name="neighborhood " placeholder="Enter full Neighborhood"></td>
                        </tr>
                        <tr>
                            <td><label for="sqft">Enter Square Footage:</label></td>
                            <td><input type="number" id="sqft" name="sqft" placeholder="Enter Square Footage"></td>
                        </tr>
                        <tr>
                            <td><label for="garage">Does property have garage?:</label></td>
                            <td>Yes/No<input type="checkbox" id="garage" name="garage"></td>
                        </tr>
                        <tr>
                            <td><label for="transit">Is public transport available?:</label></td>
                            <td>Yes/No<input type="checkbox" id="transit" name="transit"></td>
                        </tr>
                        <tr>
                            <td><button>Cancel</button></td>
                            <td><button type="submit">Submit</button></td>
                        </tr>
                    </tbody>
                </table>
            </fieldset>
        </form>
    </main>

    <footer>

    </footer>
    <script src="#"></script>
</body>
</html>
