<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Document</title>
</head>

<body>
    <header class="universal-header">
        <table class="nav-table-container" width="100%" border="0" cellspacing="0" cellpadding="0">
            <tbody>
                <tr>
                    <td class="nav-logo-cell">
                        <a href="index.html" class="logo-brand">
                            BRAND LOGO
                        </a>
                    </td>

                    <td class="nav-menu-cell">
                            <ul class="nav-menu">
                                
                                <li><a href="search.html" class="nav-link">Search Listings</a></li>
                                <li><a href="addPropertyPage.html" class="nav-link">Add Property</a></li>
                                <li><a href="addWorkSpacePage.html" class="nav-link">Add Workplace</a></li>
                            </ul>
                        </td>

                    <td class="nav-action-cell" align="right">
                        <div class="nav-search-box">
                            <input type="text" class="nav-search-input" placeholder="Quick Search...">
                        </div>
                    <td class="nav-menu-cell">
                        <ul class="nav-menu">
                            <li><a href="login.html" class="nav-link">Login</a></li>
                            <!-- Swap these out if logged in -->
                        </ul>
                    </td>
                    </td>
                </tr>
            </tbody>
        </table>
    </header>

    <main>
        <h1>Add a Workspace</h1>
        <form id="workspace">
            <fieldset>
                <table>
                    <thead>
                        <tr>
                            <th>
                                <label for="properties">Search a property by Zip-Code</label>
                            </th>
                        </tr>

                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <input type="text" id="propertySearch" autocomplete="postal-code" required>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </fieldset>

            <fieldset>
                <legend>Workspace</legend>
                <table>
                    <tbody>
                        <tr>
                            <td><label for="type">Workspace Type:</label></td>
                            <td>
                                <select name="type" id="type">
                                    <option value="" disabled selected>Please choose an option</option>
                                    <option value="meet">Meeting room</option>
                                    <option value="private">Private office</option>
                                    <option value="open">Open desk</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td><label for="seats">Enter number of seats:</label></td>
                            <td><input type="number" id="seats" name="seats" placeholder="Enter seats" required></td>
                        </tr>
                        <tr>
                            <td><label for="smoke">Smokable area?:</label></td>
                            <td>Yes/No<input type="checkbox" id="smoke" name="smoke"></td>
                        </tr>
                        <tr>
                            <td><label for="date">Enter available date:</label></td>
                            <td><input type="date" id="date" name="date" required></td>
                        </tr>
                        <tr>
                            <td><label for="term">Lease term:</label></td>
                            <td><input type="number" id="term" name="term" placeholder="Enter term's duration"><select
                                    name="dwm" id="dwm">
                                    <option value="" disabled selected>days, weeks, or months</option>
                                    <option value="day">days</option>
                                    <option value="week">weeks</option>
                                    <option value="month">months</option>
                                </select></td>
                        </tr>
                        <tr>
                            <td><button>Cancel</button></td>
                            <td><button type="submit">Submit</button></td>
                        </tr>
                    </tbody>
                </table>
            </fieldset>
        </form>
        <div id="workspaces"></div>
    </main>

    <footer id="footer"></footer>
    <script>
        document.getElementById("footer").innerText = "© " + new Date().getFullYear() + " Shared Workspace";
    </script>
    <script type="module" src="../js/addWorkspace.js"></script>
</body>

</html>
