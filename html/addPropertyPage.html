</head>

<body>
    <header class="universal-header">
        <table class="nav-table-container" width="100%" border="0" cellspacing="0" cellpadding="0">
            <tbody>
                <tr>
                    <td class="nav-logo-cell">
                        <a href="index.html" class="logo-brand">
                            BRAND LOGO
                        </a>
                    </td>

                    <td class="nav-menu-cell">
                        <ul class="nav-menu">

                            <li><a href="html/search.html" class="nav-link">Search Listings</a></li>
                            <li><a href="html/addPropertyPage.html" class="nav-link">Add Property</a></li>
                            <li><a href="html/addWorkSpacePage.html" class="nav-link">Add Workplace</a></li>
                        </ul>
                    </td>

                    <td class="nav-action-cell" align="right">
                        <div class="nav-search-box">
                            <input type="text" class="nav-search-input" placeholder="Quick Search...">
                        </div>
                    <td class="nav-menu-cell">
                        <ul class="nav-menu">
                            <li><a href="html/login.html" class="nav-link">Login</a></li>
                            <!-- Swap these out if logged in -->

                        </ul>
                    </td>
                    </td>
                </tr>
            </tbody>
        </table>
    </header>

    <main>
        <h1>Add a Property</h1>
        <form id="property">
            <fieldset>
                <legend>Add Property</legend>
                <table>
                    <tbody>
                        <tr>
                            <td><label for="address">Enter Address:</label></td>
                            <td><input type="text" id="address" name="address" placeholder="Enter full address"
                                    required></td>
                        </tr>
                        <tr>
                            <td><label for="neighborhood">Enter Neighborhood:</label></td>
                            <td><input type="text" id="neighborhood" name="neighborhood "
                                    placeholder="Enter full Neighborhood" required></td>
                        </tr>
                        <tr>
                            <td><label for="sqft">Enter Square Footage:</label></td>
                            <td><input type="number" id="sqft" name="sqft" placeholder="Enter Square Footage" required>
                            </td>
                        </tr>
                        <tr>
                            <td><label for="garage">Does property have garage?:</label></td>
                            <td>Yes/No<input class="checkbox" type="checkbox" id="garage" name="garage" value="0"></td>
                        </tr>
                        <tr>
                            <td><label for="transit">Is public transport available?:</label></td>
                            <td>Yes/No<input class="checkbox" type="checkbox" id="transit" name="transit" value="0">
                            </td>
                        </tr>
                        <tr>
                            <td><button>Cancel</button></td>
                            <td><button type="submit">Submit</button></td>
                        </tr>
                    </tbody>
                </table>
            </fieldset>
        </form>
    </main>

    <footer id="footer"></footer>
    <script>
        document.getElementById("footer").innerText = "© " + new Date().getFullYear() + " Shared Workspace";
    </script>
    <script src="../JS/addProperty.js"></script>
