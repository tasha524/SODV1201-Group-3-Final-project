<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workspace Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🔍 Find a Workspace</h1>

   
    <div class="filters">
      <input type="text" id="location" placeholder="Neighborhood">

      <input type="number" id="maxPrice" placeholder="Max Price">

      <input type="number" id="minSeats" placeholder="Min Seats">

      <select id="smoking">
        <option value="">Smoking?</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
      </select>

      <button onclick="search()">Search</button>
    </div>

    <!-- RESULTS -->
    <div id="results"></div>

    <!-- DETAILS -->
    <div id="details"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
